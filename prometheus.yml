global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8081']

  - job_name: 'fraud-detection-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['fraud-detection-service:8083']

  - job_name: 'inquiry-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['inquiry-service:8085']

  - job_name: 'ai-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ai-service:8087']
