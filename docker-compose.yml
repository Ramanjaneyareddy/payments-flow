
# ─────────────────────────────────────────────────────────────────────
# PayFlow — Complete Docker Compose
#
# Services:
#   Infrastructure : mysql, redis, zookeeper, kafka, kafka-ui,
#                    elasticsearch, prometheus, grafana
#   Application    : payment-service (8081), fraud-detection-service (8083),
#                    inquiry-service (8085), ai-service (8087)
#
# Quick start:
#   export OPENAI_API_KEY=sk-...
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: payflow-mysql
    environment:
      MYSQL_DATABASE: payflow
      MYSQL_USER: payflow
      MYSQL_PASSWORD: payflow
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -prootpassword"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7.2-alpine
    container_name: payflow-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: payflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: payflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: payflow-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: payflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: payflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: payflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #  depends_on:
  #    - payment-service
  #    - fraud-detection-service
  #    - inquiry-service
  #    - ai-service

  grafana:
    image: grafana/grafana:latest
    container_name: payflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # ── Application Services ─────────────────────────────────────────────

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payflow-payment-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_USERNAME: payflow
      DB_PASSWORD: payflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  fraud-detection-service:
    build:
      context: ./fraud-detection-service
      dockerfile: Dockerfile
    container_name: payflow-fraud-detection-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  inquiry-service:
    build:
      context: ./inquiry-service
      dockerfile: Dockerfile
    container_name: payflow-inquiry-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      DB_USERNAME: payflow
      DB_PASSWORD: payflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: payflow-ai-service
    depends_on:
      payment-service:
        condition: service_healthy
      inquiry-service:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PAYMENT_SERVICE_URL: http://payment-service:8081
      INQUIRY_SERVICE_URL: http://inquiry-service:8085
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql_data:
  redis_data:
  es_data:
